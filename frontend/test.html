<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Test Page</title>
  <style>
    body { background: #0b1220; color: #e5edf8; font-family: sans-serif; padding: 40px; text-align: center; }
    h1 { color: #10b981; }
    .box { background: rgba(15,23,41,.82); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 400px; }
  </style>
</head>
<body>
  <h1>Test Page</h1>
  <div class="box">
    <p>If you can see this, the server is working.</p>
    <p id="js-status">JS not loaded</p>
  </div>
  <script>
    document.getElementById('js-status').textContent = '✅ JS loaded successfully';
    document.documentElement.style.borderTop = '6px solid #00ff00';
  </script>
</body>
</html>
