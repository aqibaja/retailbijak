<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

 <meta property="og:type" content="website">
 <meta property="og:title" content="RetailBijak — IDX Stock Intelligence">
 <meta property="og:description" content="Platform analisis saham IDX profesional: stock scanner, market dashboard, portfolio tracker, technical & fundamental analysis real-time.">
 <meta property="og:url" content="https://retailbijak.rich27.my.id">
 <meta property="og:site_name" content="RetailBijak">
 <meta property="og:image" content="https://retailbijak.rich27.my.id/assets/site-logo.png">
 <meta name="twitter:card" content="summary_large_image">
 <meta name="twitter:title" content="RetailBijak — IDX Stock Intelligence">
 <meta name="twitter:description" content="Platform analisis saham IDX profesional: stock scanner, market dashboard, portfolio tracker, technical & fundamental analysis real-time.">
 <link rel="icon" type="image/svg+xml" href="assets/site-logo.png">
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="style.css?v=20260503i">
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
 <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
 <header class="topbar">
   <div class="topbar-brand">
     <a href="#dashboard" class="topbar-brand-link" aria-label="RetailBijak dashboard">
       <img class="site-logo-img" src="assets/site-logo.png" alt="RetailBijak logo" onerror="this.style.display='none'">
       <strong class="logo">RetailBijak</strong>
     </a>
   </div>
   <div class="topbar-ticker-wrap"><div class="tape-row" id="running-ticker"></div></div>
   <div class="topbar-actions flex items-center gap-4">
     <button class="btn btn-icon" id="cmd-k-trigger" aria-label="Cari"><i data-lucide="search" style="width:18px;"></i></button>
     <button class="btn btn-icon" id="theme-toggle" aria-label="Ubah tema"><i data-lucide="moon" style="width:18px;"></i></button>
     <a href="#settings" class="btn btn-icon" aria-label="Pengaturan"><i data-lucide="settings" style="width:18px;"></i></a>
   </div>
 </header>
 <aside class="sidebar">
   <nav class="flex-col items-center gap-2" style="width:100%;">
     <a href="#dashboard" class="nav-item active" data-view="dashboard" data-tooltip="Dashboard"><i data-lucide="layout-grid" style="width:20px;"></i></a>
     <a href="#screener" class="nav-item" data-view="screener" data-tooltip="Pemindai"><i data-lucide="radar" style="width:20px;"></i></a>
     <a href="#market" class="nav-item" data-view="market" data-tooltip="Pasar"><i data-lucide="globe" style="width:20px;"></i></a>
     <a href="#portfolio" class="nav-item" data-view="portfolio" data-tooltip="Aset"><i data-lucide="briefcase" style="width:20px;"></i></a>
     <a href="#news" class="nav-item" data-view="news" data-tooltip="Berita"><i data-lucide="newspaper" style="width:20px;"></i></a>
   </nav>
 </aside>
 <main class="main-content" id="app-root"></main>
 <nav class="bottom-nav">
   <a href="#dashboard" class="bottom-nav-item active" data-view="dashboard"><i data-lucide="layout-grid"></i><span>Beranda</span></a>
   <a href="#screener" class="bottom-nav-item" data-view="screener"><i data-lucide="radar"></i><span>Pindai</span></a>
   <a href="#market" class="bottom-nav-item" data-view="market"><i data-lucide="globe"></i><span>Pasar</span></a>
   <a href="#news" class="bottom-nav-item" data-view="news"><i data-lucide="newspaper"></i><span>Berita</span></a>
   <a href="#portfolio" class="bottom-nav-item" data-view="portfolio"><i data-lucide="briefcase"></i><span>Aset</span></a>
 </nav>
 <div class="search-overlay" id="search-overlay"><div class="search-modal"><input type="text" id="global-search-input" placeholder="Cari kode saham, emiten, atau sektor..."></div></div>
 <div id="toast-container" style="position:fixed; bottom:80px; right:20px; z-index:2000;"></div>
 <script type="module" src="js/main.js?v=20260503aa"></script>
</body>
</html>
