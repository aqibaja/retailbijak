<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>retailbijak — Professional Stock Intelligence</title>
  
  <!-- Fonts: Inter for UI, JetBrains Mono for Data -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Core Styles -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="flex items-center gap-4">
      <a href="#dashboard" class="flex items-center" style="gap:10px;">
        <div style="width:28px; height:28px; background:var(--primary-color); border-radius:6px; display:grid; place-items:center; color:#fff; box-shadow: 0 0 12px rgba(59,130,246,0.4);">
          <i data-lucide="activity" style="width:16px;"></i>
        </div>
        <strong style="font-size:16px; letter-spacing:-0.5px; display:none; @media(min-width:768px){display:block;}">retailbijak</strong>
      </a>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <span class="status-dot live"></span>
        <span class="text-xs uppercase strong text-muted" id="market-status-text">IDX OPEN</span>
      </div>
      <div style="width:1px; height:16px; background:var(--border-strong);"></div>
      <span class="mono strong text-base" id="topbar-ihsg-val">7,080.63</span>
      <span class="mono text-xs text-up" id="topbar-ihsg-pct">+0.12%</span>
      <div style="width:1px; height:16px; background:var(--border-strong);"></div>
      
      <!-- Command Palette Trigger -->
      <button class="btn btn-icon" id="cmd-k-trigger" aria-label="Search">
        <i data-lucide="search" style="width:18px;"></i>
      </button>
      
      <!-- Settings/Profile -->
      <a href="#settings" class="btn btn-icon" aria-label="Settings">
        <i data-lucide="settings" style="width:18px;"></i>
      </a>
    </div>
  </header>

  <!-- Desktop Sidebar -->
  <aside class="sidebar">
    <nav class="flex-col items-center gap-2" style="width:100%;">
      <a href="#dashboard" class="nav-item active" data-view="dashboard" data-tooltip="Dashboard">
        <i data-lucide="layout-grid" style="width:20px;"></i>
      </a>
      <a href="#screener" class="nav-item" data-view="screener" data-tooltip="Scanner">
        <i data-lucide="radar" style="width:20px;"></i>
      </a>
      <a href="#market" class="nav-item" data-view="market" data-tooltip="Market Overview">
        <i data-lucide="globe" style="width:20px;"></i>
      </a>
      <a href="#portfolio" class="nav-item" data-view="portfolio" data-tooltip="Portfolio">
        <i data-lucide="briefcase" style="width:20px;"></i>
      </a>
      <div style="width:24px; height:1px; background:var(--border-subtle); margin:8px 0;"></div>
      <a href="#news" class="nav-item" data-view="news" data-tooltip="Intelligence">
        <i data-lucide="newspaper" style="width:20px;"></i>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content" id="app-root"></main>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#dashboard" class="bottom-nav-item active" data-view="dashboard">
      <i data-lucide="layout-grid"></i><span>Home</span>
    </a>
    <a href="#market" class="bottom-nav-item" data-view="market">
      <i data-lucide="globe"></i><span>Market</span>
    </a>
    
    <!-- Floating Center Button for Search/Scan -->
    <div style="position:relative; width:64px;">
      <a href="#screener" class="fab-search" data-view="screener">
        <i data-lucide="radar"></i>
      </a>
    </div>
    
    <a href="#portfolio" class="bottom-nav-item" data-view="portfolio">
      <i data-lucide="briefcase"></i><span>Assets</span>
    </a>
    <a href="#news" class="bottom-nav-item" data-view="news">
      <i data-lucide="newspaper"></i><span>News</span>
    </a>
  </nav>

  <!-- Command Palette / Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-modal">
      <div class="search-input-wrap">
        <i data-lucide="search" style="color:var(--text-muted); width:20px;"></i>
        <input type="text" id="global-search-input" placeholder="Search ticker, company, or sector... (Esc to close)">
        <span class="badge">CMD+K</span>
      </div>
      <div class="p-4">
        <div class="text-xs text-muted uppercase mb-2">Suggestions</div>
        <div class="flex-col gap-2">
          <a href="#stock/BBCA" class="flex justify-between items-center p-2 hover-bg" style="border-radius:4px;">
            <div class="flex items-center gap-3">
              <span class="badge badge-primary">EQ</span>
              <span class="mono strong">BBCA</span>
              <span class="text-sm text-muted">Bank Central Asia Tbk.</span>
            </div>
          </a>
          <a href="#stock/GOTO" class="flex justify-between items-center p-2 hover-bg" style="border-radius:4px;">
            <div class="flex items-center gap-3">
              <span class="badge badge-primary">EQ</span>
              <span class="mono strong">GOTO</span>
              <span class="text-sm text-muted">GoTo Gojek Tokopedia Tbk.</span>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications Container -->
  <div id="toast-container" style="position:fixed; bottom:80px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:10px;"></div>

  <style>
    .hover-bg:hover { background: rgba(255,255,255,0.05); }
  </style>
  
  <script type="module" src="js/main.js"></script>
</body>
</html>
