<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RetailBijak — Professional Stock Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="flex items-center gap-4">
      <a href="#dashboard" class="flex items-center" style="gap:10px;">
        <img src="assets/br-logo.svg" alt="BR" class="rb-logo-img" width="44" height="20">
        <strong class="logo">RetailBijak</strong>
      </a>
    </div>

    <!-- Running Ticker (kun.pro style) -->
    <div class="topbar-ticker-wrap">
      <div class="tape-row" id="running-ticker">
        <!-- JS will populate this -->
        <div class="tape-card">
          <div class="flex-col">
            <div class="tape-pair">GOTO</div>
            <div class="tape-price">96</div>
          </div>
          <div class="flex-col items-end">
            <div class="tape-chg up">+9.89%</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2" style="display:none; @media(min-width:768px){display:flex;}">
        <span class="status-dot live"></span>
        <span class="text-xs uppercase strong text-muted" id="market-status-text">IDX OPEN</span>
      </div>
      <div style="width:1px; height:16px; background:var(--border-strong);"></div>
      <span class="mono strong text-base" id="topbar-ihsg-val">7,080.63</span>
      <span class="mono text-xs text-up" id="topbar-ihsg-pct">+0.12%</span>
      <div style="width:1px; height:16px; background:var(--border-strong);"></div>
      
      <button class="btn btn-icon" id="cmd-k-trigger" aria-label="Search">
        <i data-lucide="search" style="width:18px;"></i>
      </button>

      <button class="btn btn-icon" id="lang-toggle" aria-label="Language">
        <span style="font-size:12px; font-weight:700;">EN</span>
      </button>

      <button class="btn btn-icon" id="theme-toggle" aria-label="Theme">
        <i data-lucide="moon" style="width:18px;"></i>
      </button>
      
      <a href="#settings" class="btn btn-icon" aria-label="Settings">
        <i data-lucide="settings" style="width:18px;"></i>
      </a>
    </div>
  </header>

  <!-- Desktop Sidebar -->
  <aside class="sidebar">
    <nav class="flex-col items-center gap-2" style="width:100%;">
      <a href="#dashboard" class="nav-item active" data-view="dashboard" data-tooltip="Dashboard">
        <i data-lucide="layout-grid" style="width:20px;"></i>
      </a>
      <a href="#screener" class="nav-item" data-view="screener" data-tooltip="Scanner">
        <i data-lucide="radar" style="width:20px;"></i>
      </a>
      <a href="#market" class="nav-item" data-view="market" data-tooltip="Market Overview">
        <i data-lucide="globe" style="width:20px;"></i>
      </a>
      <a href="#portfolio" class="nav-item" data-view="portfolio" data-tooltip="Portfolio">
        <i data-lucide="briefcase" style="width:20px;"></i>
      </a>
      <div style="width:24px; height:1px; background:var(--border-subtle); margin:8px 0;"></div>
      <a href="#news" class="nav-item" data-view="news" data-tooltip="Intelligence">
        <i data-lucide="newspaper" style="width:20px;"></i>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content" id="app-root"></main>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#dashboard" class="bottom-nav-item active" data-view="dashboard">
      <i data-lucide="layout-grid"></i><span data-i18n="dashboard">Home</span>
    </a>
    <a href="#screener" class="bottom-nav-item" data-view="screener">
      <i data-lucide="radar"></i><span>Scan</span>
    </a>
    <a href="#market" class="bottom-nav-item" data-view="market">
      <i data-lucide="globe"></i><span data-i18n="market">Market</span>
    </a>
    <a href="#news" class="bottom-nav-item" data-view="news">
      <i data-lucide="newspaper"></i><span data-i18n="news">News</span>
    </a>
    <a href="#portfolio" class="bottom-nav-item" data-view="portfolio">
      <i data-lucide="briefcase"></i><span data-i18n="portfolio">Assets</span>
    </a>
  </nav>

  <!-- Command Palette / Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-modal" style="background:rgba(15,23,41,0.9); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-radius:16px;">
      <div class="search-input-wrap" style="border-bottom:1px solid rgba(255,255,255,0.06);">
        <i data-lucide="search" style="color:var(--text-muted); width:20px;"></i>
        <input type="text" id="global-search-input" data-i18n="search_placeholder" placeholder="Search ticker, company, or sector... (Esc to close)" style="color:var(--text-main); font-size:16px;">
        <span class="badge" style="background:rgba(255,255,255,0.05); color:var(--text-dim); border-color:transparent;">CMD+K</span>
      </div>
      <div class="p-4">
        <div class="text-xs uppercase mb-3 strong" style="color:var(--text-dim); letter-spacing:0.05em;">Suggestions</div>
        <div class="flex-col gap-2" id="search-suggestions">
          <a href="#stock/BBCA" class="flex justify-between items-center p-3 hover-bg" style="border-radius:8px; transition:background 0.2s;">
            <div class="flex items-center gap-3">
              <span class="badge" style="background:rgba(99,102,241,0.1); color:#a5b4fc; border:1px solid rgba(99,102,241,0.2);">EQ</span>
              <span class="mono strong text-main" style="font-size:15px;">BBCA</span>
              <span class="text-sm text-muted">Bank Central Asia Tbk.</span>
            </div>
          </a>
          <a href="#stock/GOTO" class="flex justify-between items-center p-3 hover-bg" style="border-radius:8px; transition:background 0.2s;">
            <div class="flex items-center gap-3">
              <span class="badge" style="background:rgba(99,102,241,0.1); color:#a5b4fc; border:1px solid rgba(99,102,241,0.2);">EQ</span>
              <span class="mono strong text-main" style="font-size:15px;">GOTO</span>
              <span class="text-sm text-muted">GoTo Gojek Tokopedia Tbk.</span>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications Container -->
  <div id="toast-container" style="position:fixed; bottom:80px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:10px;"></div>

  <style>
    .hover-bg:hover { background: rgba(255,255,255,0.05); }
    .ticker-wrap { display:none; }
    @media (min-width: 1024px) { .ticker-wrap { display:flex; } }
  </style>
  
  <script type="module" src="js/boot-20260430m.js"></script>
</body>
</html>
