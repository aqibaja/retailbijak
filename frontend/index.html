<body>
<a href="#app-root" class="skip-link" data-i18n="skip_link">Langsung ke konten</a>
<header class="topbar">
   <div class="topbar-progress" id="scroll-progress"></div>
   <div class="topbar-brand">
     <a href="#dashboard" class="topbar-brand-link" aria-label="RetailBijak dashboard" data-i18n-title="topbar.dashboard_label">

     </a>
   </div>
   <div class="topbar-status">
    <div class="topbar-ihsg">
      <span class="mono strong tabular-nums" id="topbar-ihsg-val">7,080.63</span>
      <span class="mono text-xs" id="topbar-ihsg-pct">+0.00%</span>
    </div>
    <div class="topbar-market-status">
      <span class="status-dot" id="market-dot"></span>
      <span class="text-xs text-dim" id="market-status-text" data-i18n="topbar.market_closed">IDX TUTUP</span>
    </div>
  </div>
  <div class="topbar-ticker-wrap"><div class="tape-row" id="running-ticker"></div></div>
   <div class="topbar-actions flex items-center gap-4">
    <button class="btn btn-icon" id="cmd-k-trigger" aria-label="Cari" data-i18n-title="topbar.search_label"><i data-lucide="search" style="width:18px;"></i></button>
    <button class="btn btn-icon" id="lang-toggle" aria-label="Ganti bahasa" data-i18n-title="topbar.language_toggle"><span class="lang-toggle-text">ID</span></button>
    <button class="btn btn-icon" id="theme-toggle" aria-label="Ubah tema" data-i18n-title="topbar.theme_label"><i data-lucide="moon" style="width:18px;"></i></button>
     <a href="#settings" class="btn btn-icon" aria-label="Pengaturan" data-i18n-title="topbar.settings_label"><i data-lucide="settings" style="width:18px;"></i></a>
   </div>
 </header>
<aside class="sidebar" role="navigation" aria-label="Navigasi utama">

    <a href="#ai-picks" class="nav-item" data-view="ai-picks" data-tooltip="AI Picks" data-i18n-title="sidebar.ai_picks_tooltip"><i data-lucide="sparkles" style="width:20px;" aria-hidden="true"></i></a>

 <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Cari saham" data-i18n-title="search.search_dialog_label">
  <div class="search-modal">
    <div class="search-input-wrap">
      <i data-lucide="search" style="width:18px;flex-shrink:0;color:var(--text-muted)"></i>
      <input type="text" id="global-search-input" data-i18n-placeholder="search.search_placeholder" placeholder="Cari kode saham, emiten, atau sektor..." aria-label="Kata kunci pencarian" autocomplete="off" />
    </div>
    <div class="search-hints"><span data-i18n="search.search_hint_cmd">Cmd+K</span><span data-i18n="search.search_hint_select">↵ pilih</span><span data-i18n="search.search_hint_close">Esc tutup</span></div>
    <div id="search-suggestions" class="search-suggestions"><div class="text-sm text-muted p-3" data-i18n="search.search_input_hint">Ketik kode saham atau nama emiten.</div></div>
  </div>
</div>
 <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<div id="network-status" class="network-status hidden" role="status" aria-live="assertive"></div>
 <script>
  // Error catcher — pakai window.addEventListener('error') karena window.onerror
  // TIDAK menangkap error dari ES Modules (type="module")
  window.addEventListener('error', function(e) {
   const el = document.getElementById('app-root');
   if (!el) return;
   e.preventDefault();
   el.classList.remove('page-loading');
   // Dynamically import i18n to get t() function
   import('./js/i18n.js').then(module => {
     const t = module.t;
     el.innerHTML = '<div style="padding:20px;color:#f87171;font-family:monospace;font-size:13px;">' +
       '<strong style="color:#fff;">' + t('error.title') + '</strong><br>' +
       (e.message || e.error?.message || String(e)) +
       '<br><small style="color:#94a3b8;">' + (e.filename||'') + ':' + (e.lineno||'') + ':' + (e.colno||'') + '</small>' +
       '<br><small style="color:#fbbf24;margin-top:8px;display:block;">' + t('error.message') + '</small></div>';
   }).catch(() => {
     // Fallback if i18n fails to load
     el.innerHTML = '<div style="padding:20px;color:#f87171;font-family:monospace;font-size:13px;">' +
       '<strong style="color:#fff;">⚠️ JavaScript Error</strong><br>' +
       (e.message || e.error?.message || String(e)) +
       '<br><small style="color:#94a3b8;">' + (e.filename||'') + ':' + (e.lineno||'') + ':' + (e.colno||'') + '</small>' +
       '<br><small style="color:#fbbf24;margin-top:8px;display:block;">Coba refresh halaman atau hubungi admin.</small></div>';
   });
  });
  // Safety: force-remove page-loading setelah 5 detik (anti stuck blank)
  setTimeout(function() {
   var el = document.getElementById('app-root');
   if (el) el.classList.remove('page-loading');
  }, 5000);
 </script>
 <script type="module" src="js/main.js?v=20260518N"></script>
 <script nomodule>
  // Fallback untuk browser tanpa ES module support
  import('./js/i18n.js').then(module => {
    const t = module.t;
    document.getElementById('app-root').innerHTML =
      '<div style="padding:20px;color:#f87171;font-family:sans-serif;">' +
      '<strong>' + t('error.browser_unsupported') + '</strong><br>' +
      '<small>' + t('error.browser_hint') + '</small></div>';
  }).catch(() => {
    // Fallback if i18n fails to load
    document.getElementById('app-root').innerHTML =
      '<div style="padding:20px;color:#f87171;font-family:sans-serif;">' +
      '<strong>⚠️ Browser tidak mendukung ES Modules.</strong><br>' +
      '<small>Gunakan Chrome/Safari/Edge terbaru.</small></div>';
  });
 </script>
