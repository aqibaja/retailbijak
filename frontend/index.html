<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retailbijak — IDX Stock Intelligence</title>
  <meta name="description" content="retailbijak adalah platform stock scanner, market dashboard, dan portfolio tracker untuk analisis saham IDX yang profesional.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
</head>
<body>
  <a href="#app-root" class="skip-to-content">Lewati ke konten utama</a>

  <header class="topbar">
    <div class="topbar-left">
      <a href="#dashboard" class="brand">
        <span class="brand-mark"><i data-lucide="candlestick-chart"></i></span>
        <span class="brand-text">
          <strong>retailbijak</strong>
          <small>IDX Stock Intelligence</small>
        </span>
      </a>
      <div class="search-box">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" placeholder="Cari ticker, sektor, atau emiten...">
        <span class="search-hint">⌘K</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="market-status" id="market-status-pill"><span class="status-indicator open"></span><span class="status-text">MARKET OPEN</span></div>
      <div class="idx-mini-display">
        <span class="idx-label">IHSG</span>
        <span class="idx-val">--</span>
        <span class="idx-change">--</span>
      </div>
      <button class="icon-btn" aria-label="Notifications" title="Notifications"><i data-lucide="bell"></i></button>
      <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn mobile-more-btn" type="button" data-open-drawer aria-label="More" title="More"><i data-lucide="ellipsis"></i></button>
      <div class="user-avatar" title="retailbijak">RB</div>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-section-label">Navigate</div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active mobile-primary" data-view="dashboard"><i data-lucide="layout-dashboard"></i><span class="nav-text">Dashboard</span></a>
        <a href="#market" class="nav-item" data-view="market"><i data-lucide="bar-chart-3"></i><span class="nav-text">Market</span></a>
        <a href="#screener" class="nav-item mobile-primary" data-view="screener"><i data-lucide="filter"></i><span class="nav-text">Screener</span></a>
        <a href="#portfolio" class="nav-item mobile-primary" data-view="portfolio"><i data-lucide="pie-chart"></i><span class="nav-text">Portfolio</span></a>
        <a href="#watchlist" class="nav-item" data-view="watchlist"><i data-lucide="eye"></i><span class="nav-text">Watchlist</span></a>
        <a href="#news" class="nav-item" data-view="news"><i data-lucide="newspaper"></i><span class="nav-text">News</span></a>
        <div class="nav-divider"></div>
        <a href="#settings" class="nav-item mobile-primary" data-view="settings"><i data-lucide="settings"></i><span class="nav-text">Settings</span></a>
        <a href="#help" class="nav-item" data-view="help"><i data-lucide="help-circle"></i><span class="nav-text">Help</span></a>
      </nav>
      <div class="sidebar-footnote">
        <span class="dot"></span>
        <span>Powered by FastAPI + local market data</span>
      </div>
    </aside>

    <main class="main-content" id="app-root"></main>
  </div>

  <div class="mobile-drawer" id="mobile-drawer" aria-hidden="true">
    <div class="mobile-drawer-backdrop" data-close-drawer></div>
    <div class="mobile-drawer-panel" role="dialog" aria-label="More menu">
      <div class="mobile-drawer-head">
        <strong>More</strong>
        <button class="icon-btn" type="button" data-close-drawer aria-label="Close drawer"><i data-lucide="x"></i></button>
      </div>
      <div class="mobile-drawer-grid">
        <a href="#watchlist" class="drawer-item" data-view="watchlist"><i data-lucide="eye"></i><span>Watchlist</span></a>
        <a href="#news" class="drawer-item" data-view="news"><i data-lucide="newspaper"></i><span>News</span></a>
        <a href="#settings" class="drawer-item" data-view="settings"><i data-lucide="settings"></i><span>Settings</span></a>
        <a href="#help" class="drawer-item" data-view="help"><i data-lucide="help-circle"></i><span>Help</span></a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
