<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retailbijak — Professional Stock Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="flex items-center gap-4">
      <a href="#dashboard" class="flex items-center gap-2" style="text-decoration:none;">
        <div style="width:28px; height:28px; background:linear-gradient(135deg, var(--primary), #059669); border-radius:8px; display:grid; place-items:center; color:#000;">
          <i data-lucide="trending-up" style="width:16px;"></i>
        </div>
        <strong style="font-size:18px; letter-spacing:-0.5px; color:#fff;">retailbijak</strong>
      </a>
      <div style="width:1px; height:20px; background:var(--border); margin:0 12px;"></div>
      <div class="flex items-center gap-3">
        <span class="text-dim mono" style="font-size:10px; font-weight:600;">IDX:IHSG</span>
        <span class="mono strong" style="font-size:14px; color:var(--primary);">7,080.63</span>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2" style="background:rgba(255,255,255,0.03); padding:4px 12px; border-radius:99px; border:1px solid var(--border);">
        <i data-lucide="search" style="width:14px; color:var(--text-muted);"></i>
        <input type="text" placeholder="Quick search..." style="background:none; border:none; color:#fff; font-size:12px; width:120px; outline:none;">
      </div>
      <button class="btn" id="theme-toggle" style="border:none; padding:0; background:none;"><i data-lucide="moon" style="width:18px;"></i></button>
      <div style="width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg, #1e293b, #0f172a); display:grid; place-items:center; font-size:11px; font-weight:800; border:1px solid var(--border); color:var(--primary);">RB</div>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="sidebar-nav flex" style="flex-direction:column;">
      <a href="#dashboard" class="nav-item active" data-view="dashboard">
        <i data-lucide="layout-dashboard" style="width:18px;"></i> <span class="nav-text">Dashboard</span>
      </a>
      <a href="#screener" class="nav-item" data-view="screener">
        <i data-lucide="target" style="width:18px;"></i> <span class="nav-text">Scanner</span>
      </a>
      <a href="#market" class="nav-item" data-view="market">
        <i data-lucide="bar-chart-2" style="width:18px;"></i> <span class="nav-text">Market</span>
      </a>
      <a href="#portfolio" class="nav-item" data-view="portfolio">
        <i data-lucide="pie-chart" style="width:18px;"></i> <span class="nav-text">Portfolio</span>
      </a>
      <div style="height:1px; background:var(--border); margin:16px 12px;"></div>
      <a href="#news" class="nav-item" data-view="news">
        <i data-lucide="newspaper" style="width:18px;"></i> <span class="nav-text">Intelligence</span>
      </a>
      <a href="#settings" class="nav-item" data-view="settings">
        <i data-lucide="settings-2" style="width:18px;"></i> <span class="nav-text">Settings</span>
      </a>
    </nav>
  </aside>

  <main class="main-content" id="app-root"></main>

  <div id="toast-container" style="position:fixed; bottom:24px; right:24px; z-index:2000;"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
