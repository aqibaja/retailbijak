<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retailbijak — Institutional Stock Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="flex items-center gap-4">
      <a href="#dashboard" class="flex items-center gap-2">
        <div style="width:24px; height:24px; background:var(--up); border-radius:4px; display:grid; place-items:center; color:#000;"><i data-lucide="bar-chart-2" style="width:16px;"></i></div>
        <strong style="font-size:16px; letter-spacing:-0.5px;">retailbijak</strong>
      </a>
      <div style="width:1px; height:20px; background:var(--border-strong); margin:0 10px;"></div>
      <div class="flex items-center gap-2">
        <span class="text-dim mono" style="font-size:10px;">IHSG</span>
        <span class="mono strong" style="font-size:14px;">7,080.63</span>
        <span class="status-indicator open"></span>
      </div>
    </div>
    
    <div class="flex items-center gap-2">
      <button class="btn" style="border:none; background:var(--bg-elevated); padding:6px 10px;"><i data-lucide="search" style="width:14px;"></i></button>
      <button class="btn" id="theme-toggle" style="border:none;"><i data-lucide="moon" style="width:14px;"></i></button>
      <div style="width:32px; height:32px; border-radius:50%; background:var(--bg-elevated); display:grid; place-items:center; font-size:10px; font-weight:700; border:1px solid var(--border-strong);">RB</div>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="sidebar-nav flex" style="flex-direction:column; gap:4px;">
      <a href="#dashboard" class="btn justify-between" style="border:none; width:100%; text-align:left;" data-view="dashboard">
        <div class="flex items-center gap-2"><i data-lucide="layout-grid" style="width:16px;"></i> <span class="nav-text">Dashboard</span></div>
      </a>
      <a href="#screener" class="btn justify-between" style="border:none; width:100%; text-align:left;" data-view="screener">
        <div class="flex items-center gap-2"><i data-lucide="scan-eye" style="width:16px;"></i> <span class="nav-text">Scanner</span></div>
      </a>
      <a href="#market" class="btn justify-between" style="border:none; width:100%; text-align:left;" data-view="market">
        <div class="flex items-center gap-2"><i data-lucide="globe" style="width:16px;"></i> <span class="nav-text">Market</span></div>
      </a>
      <a href="#portfolio" class="btn justify-between" style="border:none; width:100%; text-align:left;" data-view="portfolio">
        <div class="flex items-center gap-2"><i data-lucide="briefcase" style="width:16px;"></i> <span class="nav-text">Portfolio</span></div>
      </a>
      <div style="height:1px; background:var(--border-subtle); margin:10px 0;"></div>
      <a href="#news" class="btn justify-between" style="border:none; width:100%; text-align:left;" data-view="news">
        <div class="flex items-center gap-2"><i data-lucide="newspaper" style="width:16px;"></i> <span class="nav-text">Intelligence</span></div>
      </a>
      <a href="#settings" class="btn justify-between" style="border:none; width:100%; text-align:left;" data-view="settings">
        <div class="flex items-center gap-2"><i data-lucide="settings" style="width:16px;"></i> <span class="nav-text">Settings</span></div>
      </a>
    </nav>
  </aside>

  <main class="main-content" id="app-root"></main>

  <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:2000;"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
