  <style>html{background:var(--bg-base,#0b1220);color:var(--text-main,#e5edf8);}body{margin:0;font-family:Inter,sans-serif;position:relative;}html::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--dot-color, rgba(255,255,255,0.025)) var(--dot-size,1px),transparent var(--dot-size,1px));background-size:var(--dot-spacing,24px) var(--dot-spacing,24px);pointer-events:none;z-index:0;}body>*{position:relative;z-index:1;}</style>

<body>
<a href="#app-root" class="skip-link" data-i18n="skip_link">Langsung ke konten</a>
<header class="topbar">
   <div class="topbar-progress" id="scroll-progress"></div>
   <div class="topbar-brand">
     <a href="#dashboard" class="topbar-brand-link" aria-label="RetailBijak dashboard">
       <img class="site-logo-img" src="assets/site-logo.png" alt="RetailBijak logo" onerror="this.style.display='none'">
       <strong class="logo">RetailBijak</strong>
     </a>
   </div>
   <div class="topbar-status">
    <div class="topbar-ihsg">
      <span class="mono strong tabular-nums" id="topbar-ihsg-val">7,080.63</span>
      <span class="mono text-xs" id="topbar-ihsg-pct">+0.00%</span>
    </div>
    <div class="topbar-market-status">
      <span class="status-dot" id="market-dot"></span>
      <span class="text-xs text-dim" id="market-status-text">IDX TUTUP</span>
      <span class="mono text-xs countdown-clock hidden" id="market-countdown"></span>
    </div>
  </div>
  <div class="topbar-ticker-wrap"><div class="tape-row" id="running-ticker"></div></div>
   <div class="topbar-actions flex items-center gap-4">
    <button class="btn btn-icon" id="cmd-k-trigger" aria-label="Cari"><i data-lucide="search" style="width:18px;"></i></button>
    <button class="btn btn-icon" id="lang-toggle" aria-label="Ganti bahasa" title="ID/EN"><span class="lang-toggle-text">ID</span></button>
    <button class="btn btn-icon" id="theme-toggle" aria-label="Ubah tema"><i data-lucide="moon" style="width:18px;"></i></button>
     <a href="#settings" class="btn btn-icon" aria-label="Pengaturan"><i data-lucide="settings" style="width:18px;"></i></a>
   </div>
 </header>
<aside class="sidebar" role="navigation" aria-label="Navigasi utama">
  <nav class="flex-col items-center gap-2" style="width:100%;">
    <a href="#dashboard" class="nav-item active" data-view="dashboard" data-tooltip="Dashboard" aria-current="page"><i data-lucide="layout-grid" style="width:20px;" aria-hidden="true"></i></a>
    <a href="#screener" class="nav-item" data-view="screener" data-tooltip="Pemindai"><i data-lucide="radar" style="width:20px;" aria-hidden="true"></i></a>
    <a href="#market" class="nav-item" data-view="market" data-tooltip="Pasar"><i data-lucide="globe" style="width:20px;" aria-hidden="true"></i></a>
    <a href="#portfolio" class="nav-item" data-view="portfolio" data-tooltip="Aset"><i data-lucide="briefcase" style="width:20px;" aria-hidden="true"></i></a>
    <a href="#news" class="nav-item" data-view="news" data-tooltip="Berita"><i data-lucide="newspaper" style="width:20px;" aria-hidden="true"></i></a>
    <a href="#ai-picks" class="nav-item" data-view="ai-picks" data-tooltip="AI Picks"><i data-lucide="sparkles" style="width:20px;" aria-hidden="true"></i></a>
  </nav>
</aside>
<main class="main-content" id="app-root" role="main">
</main>
<!-- Bottom Navigation (Mobile) -->
<nav class="bottom-nav" role="navigation" aria-label="Navigasi bawah">
    <a href="#dashboard" class="nav-item active" data-view="dashboard"><i data-lucide="layout-grid" style="width:22px;"></i><span>Dashboard</span></a>
    <a href="#screener" class="nav-item" data-view="screener"><i data-lucide="radar" style="width:22px;"></i><span>Screener</span></a>
    <a href="#portfolio" class="nav-item" data-view="portfolio"><i data-lucide="briefcase" style="width:22px;"></i><span>Portfolio</span></a>
    <a href="#settings" class="nav-item" data-view="settings"><i data-lucide="settings" style="width:22px;"></i><span>Setting</span></a>
</nav>
<div class="network-status hidden" id="network-status" role="status" aria-live="polite"></div>
<div class="ptr-indicator" id="ptr-indicator"><div class="ptr-spinner"></div><span>Segarkan</span></div>
<div id="toast-container" class="toast-container"></div>

<!-- Global Search Overlay (Cmd+K) -->
<div id="search-overlay" class="search-overlay" role="dialog" aria-label="Pencarian global">
  <div class="search-modal" onclick="event.stopPropagation()">
    <div class="search-input-wrap">
      <i data-lucide="search" class="search-input-icon" style="width:18px;height:18px"></i>
      <input type="text" id="global-search-input" class="search-input" placeholder="Cari kode saham, nama emiten, atau sektor..." autocomplete="off" spellcheck="false" />
      <button class="btn btn-icon search-close-btn" id="search-close-btn" type="button" aria-label="Tutup pencarian"><i data-lucide="x" style="width:16px"></i></button>
    </div>
    <div id="search-suggestions" class="search-suggestions"><div class="text-sm text-muted p-3">Ketik kode saham atau nama emiten.</div></div>
  </div>
</div>
</body>
