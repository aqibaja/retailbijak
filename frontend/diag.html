<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RBK Diagnostic</title>
<style>
  body { background: #0b1220; color: #e5edf8; font-family: sans-serif; padding: 20px; }
  h1 { color: #10b981; }
  .pass { color: #34d399; font-weight: bold; }
  .fail { color: #f87171; font-weight: bold; }
  .step { background: rgba(15,23,41,.82); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 12px; margin: 8px 0; }
  .step-label { font-size: 13px; color: #94a3b8; }
  .step-result { font-size: 14px; margin-top: 4px; }
</style>
</head>
<body>
<h1>🔍 RetailBijak Diagnostic</h1>
<div id="output">Loading...</div>
<script>
  const out = document.getElementById('output');
  function log(step, ok, msg) {
    out.innerHTML += `<div class="step"><div class="step-label">${step}</div><div class="step-result"><span class="${ok ? 'pass' : 'fail'}">${ok ? '✅' : '❌'}</span> ${msg}</div></div>`;
  }

  // Step 1: Page loaded
  log('1. Page Load', true, 'HTML & inline CSS loaded at ' + new Date().toISOString());

  // Step 2: Sync script executed
  try {
    if (typeof document !== 'undefined') {
      log('2. Sync Script', true, 'document object available');
    }
  } catch(e) {
    log('2. Sync Script', false, e.message);
  }

  // Step 3: Test module import
  try {
    import('./js/version.js?v=20260513').then(() => {
      log('3. Module Import', true, 'version.js loaded via dynamic import');
    }).catch(e => {
      log('3. Module Import', false, 'Import failed: ' + e.message);
    });
  } catch(e) {
    log('3. Module Import', false, 'Import syntax error: ' + e.message);
  }

  // Step 4: Test fetch API
  try {
    fetch('/api/health').then(r => r.json()).then(d => {
      log('4. API Health', true, 'API OK: ' + JSON.stringify(d));
    }).catch(e => {
      log('4. API Health', false, 'Fetch failed: ' + e.message);
    });
  } catch(e) {
    log('4. API Health', false, 'Fetch error: ' + e.message);
  }

  // Step 5: Test CDN reachability
  const cdnTest = document.createElement('script');
  cdnTest.onload = () => log('5. CDN Script', true, 'CDN script loaded');
  cdnTest.onerror = () => log('5. CDN Script', false, 'CDN script FAILED to load');
  cdnTest.src = 'https://cdn.jsdelivr.net/npm/lucide@1.14.0/dist/umd/lucide.min.js';
  document.head.appendChild(cdnTest);

  // Step 6: Check main.js module
  setTimeout(() => {
    if (document.documentElement.getAttribute('data-js-loaded') === 'true') {
      log('6. main.js Module', true, 'main.js executed');
    } else {
      log('6. main.js Module', false, 'main.js NOT executed yet');
    }
  }, 5000);

  // Step 7: Check route
  setTimeout(() => {
    const r = document.getElementById('rbk-router-marker');
    if (r) log('7. Router', true, 'Router executed: ' + r.textContent);
    else log('7. Router', false, 'Router NOT executed');
  }, 6000);

  // Step 8: Dashboard render
  setTimeout(() => {
    const d = document.getElementById('dash-debug');
    if (d) log('8. Dashboard', true, 'Dashboard rendering: ' + d.textContent);
    else {
      const app = document.getElementById('app-root');
      log('8. Dashboard', false, 'Dashboard NOT rendered. app-root children: ' + (app ? app.children.length : 'NO APP ROOT'));
    }
  }, 7000);
</script>
</body>
</html>
